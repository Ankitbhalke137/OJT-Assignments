<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Character Counter</title>
    <style>
        body {
            font-family: 'Segoe UI', sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            background-color: #f8f9fa;
            margin: 0;
        }

        .container {
            background: white;
            padding: 2rem;
            border-radius: 12px;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.08);
            width: 400px;
        }

        textarea {
            width: 100%;
            height: 150px;
            padding: 12px;
            border: 2px solid #ddd;
            border-radius: 8px;
            resize: none;
            font-size: 1rem;
            box-sizing: border-box;
            outline: none;
            transition: border-color 0.2s;
        }

        textarea:focus {
            border-color: #007bff;
        }

        .counter-footer {
            display: flex;
            justify-content: flex-end;
            margin-top: 10px;
            font-weight: 600;
            color: #666;
        }

        .limit-reached {
            color: #dc3545;
        }

        /* Red color for warning */
    </style>
</head>

<body>

    <div class="container">
        <textarea id="myBox" maxlength="100" placeholder="Start typing..."></textarea>
        <div class="counter-footer">
            <span id="charCount">0</span>/100
        </div>
    </div>

    <script>
        const textarea = document.getElementById('myBox');
        const display = document.getElementById('charCount');
        const maxChars = 100;

        textarea.addEventListener('input', () => {
            const currentLength = textarea.value.length;

            // 1. Update the number display
            display.textContent = currentLength;

            // 2. Add visual warning when limit is reached
            if (currentLength >= maxChars) {
                display.classList.add('limit-reached');
            } else {
                display.classList.remove('limit-reached');
            }
        });
    </script>

</body>

</html>
