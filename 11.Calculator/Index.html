<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Basic Calculator</title>
    <style>
        body {
            font-family: 'Segoe UI', sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            background-color: #f0f2f5;
            margin: 0;
        }
        .calc-container {
            background: white;
            padding: 2rem;
            border-radius: 12px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
            width: 300px;
            text-align: center;
        }
        input {
            width: 80%;
            padding: 10px;
            margin: 10px 0;
            border: 1px solid #ddd;
            border-radius: 5px;
            font-size: 1rem;
        }
        .ops-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 10px;
            margin: 15px 0;
        }
        button {
            padding: 12px;
            font-size: 1.2rem;
            cursor: pointer;
            border: none;
            border-radius: 5px;
            background-color: #007bff;
            color: white;
            transition: background 0.2s;
        }
        button:hover { background-color: #0056b3; }
        #result {
            margin-top: 20px;
            font-weight: bold;
            font-size: 1.1rem;
            min-height: 1.5em;
            color: #333;
        }
        .error { color: #dc3545 !important; }
    </style>
</head>
<body>

<div class="calc-container">
    <h3>Calculator</h3>
    <input type="number" id="num1" placeholder="First Number">
    <input type="number" id="num2" placeholder="Second Number">
    
    <div class="ops-grid">
        <button onclick="calculate('+')">+</button>
        <button onclick="calculate('-')">-</button>
        <button onclick="calculate('*')">×</button>
        <button onclick="calculate('/')">÷</button>
    </div>

    <div id="result">Result will appear here</div>
</div>

<script>
    function calculate(op) {
        const val1 = document.getElementById('num1').value;
        const val2 = document.getElementById('num2').value;
        const resultDiv = document.getElementById('result');
        
        // Reset classes
        resultDiv.classList.remove('error');

        // 1. Validate numeric input
        if (val1 === "" || val2 === "") {
            resultDiv.textContent = "Please enter both numbers";
            resultDiv.classList.add('error');
            return;
        }

        const n1 = parseFloat(val1);
        const n2 = parseFloat(val2);
        let res;

        // 2. Perform operations
        switch(op) {
            case '+': res = n1 + n2; break;
            case '-': res = n1 - n2; break;
            case '*': res = n1 * n2; break;
            case '/':
                // 3. Handle divide-by-zero
                if (n2 === 0) {
                    resultDiv.textContent = "Number can not be divide by zero";
                    resultDiv.classList.add('error');
                    return;
                }
                res = n1 / n2;
                break;
        }

        resultDiv.textContent = `Result: ${res}`;
    }
</script>

</body>
</html>
