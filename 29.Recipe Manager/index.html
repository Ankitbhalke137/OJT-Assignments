<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Recipe Manager</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <h1>Recipe Manager</h1>
        <div class="form-container">
            <input type="text" id="recipeTitle" placeholder="Recipe Title">
            <textarea id="recipeDesc" placeholder="Recipe Description/Ingredients" rows="4"></textarea>
            <button id="addBtn">Add Recipe</button>
        </div>
        <div class="recipes-container" id="recipesContainer"></div>
    </div>
    <script src="script.js"></script>
</body>
</html>
