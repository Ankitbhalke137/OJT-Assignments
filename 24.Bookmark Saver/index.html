<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bookmark Saver</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <h1>Bookmark Saver</h1>
        <div class="input-area">
            <input type="text" id="siteName" placeholder="Site Name (e.g., Google)">
            <input type="url" id="siteUrl" placeholder="Site URL (e.g., https://google.com)">
            <button id="addBtn">Save Bookmark</button>
        </div>
        <div class="bookmarks-list" id="bookmarksList"></div>
    </div>
    <script src="script.js"></script>
</body>
</html>
