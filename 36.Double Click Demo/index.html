<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Double Click Demo</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <h1>Double Click to Like</h1>
        <div class="card" id="card">
            <img src="https://images.unsplash.com/photo-1518791841217-8f162f1e1131?ixlib=rb-4.0.3&auto=format&fit=crop&w=600&q=80" alt="Cat">
            <div class="heart" id="heart">❤️</div>
        </div>
        <p>Like Count: <span id="likeCount">0</span></p>
    </div>
    <script src="script.js"></script>
</body>
</html>
