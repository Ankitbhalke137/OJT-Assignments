<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hover Gallery</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <h1>Hover Gallery</h1>
        <div class="gallery">
            <div class="gallery-item" id="item1">
                <img src="https://images.unsplash.com/photo-1682687220742-aba13b6e50ba?ixlib=rb-4.0.3&auto=format&fit=crop&w=400&q=80" alt="Nature">
                <div class="overlay">Nature</div>
            </div>
            <div class="gallery-item" id="item2">
                <img src="https://images.unsplash.com/photo-1682687982501-1e5898cb4693?ixlib=rb-4.0.3&auto=format&fit=crop&w=400&q=80" alt="Landscape">
                <div class="overlay">Landscape</div>
            </div>
            <div class="gallery-item" id="item3">
                <img src="https://images.unsplash.com/photo-1682687220063-4742bd7fd538?ixlib=rb-4.0.3&auto=format&fit=crop&w=400&q=80" alt="Mountains">
                <div class="overlay">Mountains</div>
            </div>
            <div class="gallery-item" id="item4">
                <img src="https://images.unsplash.com/photo-1682695796254-3e4e1c8a1e2f?ixlib=rb-4.0.3&auto=format&fit=crop&w=400&q=80" alt="Desert">
                <div class="overlay">Desert</div>
            </div>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
